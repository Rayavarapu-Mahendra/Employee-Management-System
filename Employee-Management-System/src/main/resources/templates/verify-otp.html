<!DOCTYPE html>
<html xmlns:th="[thymeleaf.org](http://www.thymeleaf.org)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - EMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>Verify OTP</h1>
            <p>Enter the OTP sent to your email</p>

            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/verify-otp}" method="post">
                <input type="hidden" name="email" th:value="${email}">
                
                <div class="form-group">
                    <label for="otp">OTP</label>
                    <input type="text" id="otp" name="otp" class="form-control" 
                           placeholder="Enter 6-digit OTP" maxlength="6" required>
                </div>

                <button type="submit" class="btn btn-primary">Verify OTP</button>
            </form>

            <div class="login-links">
                <a th:href="@{/forgot-password}">Resend OTP</a>
            </div>
        </div>
    </div>
</body>
</html>
