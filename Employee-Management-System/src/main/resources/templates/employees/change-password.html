<!DOCTYPE html>
<html xmlns:th="[thymeleaf.org](http://www.thymeleaf.org)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - EMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="wrapper">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>EMS</h2>
            </div>
            <div class="sidebar-nav">
                <a th:href="@{/dashboard}">Dashboard</a>
                <a th:href="@{/employee/profile}">My Profile</a>
                <a th:href="@{/employee/change-password}" class="active">Change Password</a>
                <a th:href="@{/logout}">Logout</a>
            </div>
        </nav>

        <main class="main-content">
            <div class="header">
                <h1>Change Password</h1>
            </div>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <div class="card">
                <div class="card-body">
                    <form th:action="@{/employee/change-password}" method="post">
                        <div class="form-group">
                            <label for="currentPassword">Current Password</label>
                            <input type="password" id="currentPassword" name="currentPassword" 
                                   class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label for="newPassword">New Password</label>
                            <input type="password" id="newPassword" name="newPassword" 
                                   class="form-control" required minlength="6">
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">Confirm New Password</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" 
                                   class="form-control" required minlength="6">
                        </div>

                        <div class="actions">
                            <button type="submit" class="btn btn-primary">Change Password</button>
                            <a th:href="@{/employee/profile}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
