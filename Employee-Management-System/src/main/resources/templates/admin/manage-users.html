<!DOCTYPE html>
<html xmlns:th="[thymeleaf.org](http://www.thymeleaf.org)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - EMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="wrapper">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>EMS</h2>
            </div>
            <div class="sidebar-nav">
                <a th:href="@{/dashboard}">Dashboard</a>
                <a th:href="@{/admin/users}" class="active">Manage Users</a>
                <a th:href="@{/admin/departments}">Manage Departments</a>
                <a th:href="@{/hr/employees}">Manage Employees</a>
                <a th:href="@{/logout}">Logout</a>
            </div>
        </nav>

        <main class="main-content">
            <div class="header">
                <h1>Manage Users</h1>
                <a th:href="@{/admin/users/new}" class="btn btn-primary">Add New User</a>
            </div>

            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="user : ${users}">
                                    <td th:text="${user.id}">1</td>
                                    <td th:text="${user.email}">email@example.com</td>
                                    <td>
                                        <span class="badge badge-primary" th:text="${user.role}">ROLE</span>
                                    </td>
                                    <td>
                                        <span th:if="${user.enabled}" class="badge badge-success">Active</span>
                                        <span th:unless="${user.enabled}" class="badge badge-danger">Disabled</span>
                                    </td>
                                    <td class="actions">
                                        <a th:href="@{/admin/users/edit/{id}(id=${user.id})}" 
                                           class="btn btn-warning btn-sm">Edit</a>
                                        <a th:href="@{/admin/users/delete/{id}(id=${user.id})}" 
                                           class="btn btn-danger btn-sm"
                                           onclick="return confirm('Are you sure?')">Delete</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
