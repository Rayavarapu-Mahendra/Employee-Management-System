<!DOCTYPE html>
<html xmlns:th="[thymeleaf.org](http://www.thymeleaf.org)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Departments - EMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="wrapper">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>EMS</h2>
            </div>
            <div class="sidebar-nav">
                <a th:href="@{/dashboard}">Dashboard</a>
                <a th:href="@{/admin/users}">Manage Users</a>
                <a th:href="@{/admin/departments}" class="active">Manage Departments</a>
                <a th:href="@{/hr/employees}">Manage Employees</a>
                <a th:href="@{/logout}">Logout</a>
            </div>
        </nav>

        <main class="main-content">
            <div class="header">
                <h1>Manage Departments</h1>
            </div>

            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <!-- Add Department Form -->
            <div class="card">
                <div class="card-header">
                    <h3>Add New Department</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/departments/save}" th:object="${department}" method="post">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="name">Department Name</label>
                                <input type="text" id="name" th:field="*{name}" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="description">Description</label>
                                <input type="text" id="description" th:field="*{description}" class="form-control">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Add Department</button>
                    </form>
                </div>
            </div>

            <!-- Departments List -->
            <div class="card">
                <div class="card-header">
                    <h3>All Departments</h3>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Description</th>
                                    <th>Employees</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="dept : ${departments}">
                                    <td th:text="${dept.id}">1</td>
                                    <td th:text="${dept.name}">Department</td>
                                    <td th:text="${dept.description}">Description</td>
                                    <td th:text="${dept.employees.size()}">0</td>
                                    <td class="actions">
                                        <a th:href="@{/admin/departments/delete/{id}(id=${dept.id})}" 
                                           class="btn btn-danger btn-sm"
                                           onclick="return confirm('Are you sure? This may affect employees.')">Delete</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
