<!DOCTYPE html>
<html xmlns:th="[thymeleaf.org](http://www.thymeleaf.org)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Form - EMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="wrapper">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>EMS</h2>
            </div>
            <div class="sidebar-nav">
                <a th:href="@{/dashboard}">Dashboard</a>
                <a th:href="@{/admin/users}" class="active">Manage Users</a>
                <a th:href="@{/admin/departments}">Manage Departments</a>
                <a th:href="@{/hr/employees}">Manage Employees</a>
                <a th:href="@{/logout}">Logout</a>
            </div>
        </nav>

        <main class="main-content">
            <div class="header">
                <h1 th:text="${userDTO.id != null ? 'Edit User' : 'Add New User'}">User Form</h1>
            </div>

            <div class="card">
                <div class="card-body">
                    <form th:action="@{/admin/users/save}" th:object="${userDTO}" method="post">
                        <input type="hidden" th:field="*{id}">
                        
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" th:field="*{email}" class="form-control" required>
                            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" 
                                  style="color: red; font-size: 0.8rem;"></span>
                        </div>

                        <div class="form-group">
                            <label for="password">Password 
                                <span th:if="${userDTO.id != null}">(leave blank to keep current)</span>
                            </label>
                            <input type="password" id="password" th:field="*{password}" class="form-control"
                                   th:required="${userDTO.id == null}">
                        </div>

                        <div class="form-group">
                            <label for="role">Role</label>
                            <select id="role" th:field="*{role}" class="form-control" required>
                                <option value="">Select Role</option>
                                <option th:each="r : ${roles}" th:value="${r.name()}" th:text="${r.name()}">Role</option>
                            </select>
                        </div>

                        <div class="form-group" th:if="${userDTO.id != null}">
                            <label>
                                <input type="checkbox" th:field="*{enabled}"> Enabled
                            </label>
                        </div>

                        <div class="actions">
                            <button type="submit" class="btn btn-primary">Save User</button>
                            <a th:href="@{/admin/users}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
